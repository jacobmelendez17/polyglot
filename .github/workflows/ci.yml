name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest -q
      # migration check activates in slice 1b once alembic versions exist:
      # - run: alembic upgrade head && alembic downgrade -1 && alembic upgrade head

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # deploy jobs (Cloudflare Pages + Fly.io) are added once environments exist;
  # both depend on [api, web] so nothing deploys if tests fail.
